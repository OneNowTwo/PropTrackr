<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PropTrackr</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: #f8f9fa;
        color: #111827;
        font-size: 14px;
        line-height: 1.45;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .brand-mark {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, #0d9488, #14b8a6);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: -0.02em;
      }
      .brand-name {
        font-weight: 700;
        font-size: 17px;
        letter-spacing: -0.02em;
      }
      .url-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #6b7280;
        margin-bottom: 4px;
      }
      .url-box {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        word-break: break-all;
        color: #374151;
        max-height: 72px;
        overflow-y: auto;
        margin-bottom: 14px;
      }
      .btn-save {
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        background: #0d9488;
        cursor: pointer;
        transition: background 0.15s ease, opacity 0.15s ease;
      }
      .btn-save:hover:not(:disabled) {
        background: #0f766e;
      }
      .btn-save:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .btn-log {
        width: 100%;
        margin-top: 10px;
        border: 1px solid #0d9488;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 700;
        color: #0f766e;
        background: #fff;
        cursor: pointer;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }
      .btn-log:hover:not(:disabled) {
        background: #ecfdf5;
      }
      .btn-log:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .status {
        margin-top: 12px;
        min-height: 40px;
        font-size: 13px;
      }
      .status.loading {
        color: #6b7280;
      }
      .status.error {
        color: #b91c1c;
      }
      .status.success {
        color: #0f766e;
      }
      .status a {
        color: #0d9488;
        font-weight: 600;
        text-decoration: none;
      }
      .status a:hover {
        text-decoration: underline;
      }
      .footer {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #e5e7eb;
        text-align: center;
      }
      .footer a {
        color: #0d9488;
        font-weight: 600;
        font-size: 13px;
        text-decoration: none;
      }
      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <div class="brand-mark">P</div>
      <span class="brand-name">PropTrackr</span>
    </div>
    <div class="url-label">Current page</div>
    <div id="pageUrl" class="url-box">Loading…</div>
    <button type="button" id="saveBtn" class="btn-save">Save to PropTrackr</button>
    <button type="button" id="logSaleBtn" class="btn-log">
      Log sale result →
    </button>
    <div id="status" class="status" aria-live="polite"></div>
    <div class="footer">
      <a
        id="openApp"
        href="https://proptrackr.onrender.com"
        target="_blank"
        rel="noopener noreferrer"
        >Open PropTrackr</a
      >
    </div>
    <script src="popup.js"></script>
  </body>
</html>
