# Render Blueprint — https://render.com/docs/blueprint-spec
# After first deploy, set secret values in the Render dashboard (Environment tab).

services:
  - type: web
    name: proptrackr
    runtime: node
    region: singapore
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build
    # Render injects PORT for web services; package.json start binds Next to it
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      # Set these in the dashboard (sync: false) — do not commit secrets
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_REDIRECT_URI
        sync: false
      # Canonical site URL (Gmail OAuth callback redirects, etc.)
      - key: NEXT_PUBLIC_APP_URL
        value: https://proptrackr.onrender.com
      # Maps JavaScript API (set real key in dashboard)
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        sync: false
      # App route paths (match middleware / app routes)
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
        value: /dashboard
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
        value: /dashboard
